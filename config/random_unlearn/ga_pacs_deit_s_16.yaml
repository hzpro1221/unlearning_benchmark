dataset: "pacs"
data_dir: "./dataset/data_folder/pacs"

model_name: "erm_ktp_resnet50"
pretrained: true
# pretrained_model_path: "checkpoint/learn/pacs_random_10_deit_s_16/pacs_random_10_deit_s_16_epoch_5.pt"
pretrained_model_path: "checkpoint/learn/pacs_random_10_deit_s_16/pacs_random_10_deit_s_16_epoch_54.pt"

unlearn_algo: "erm_ktp"
unlearn_setting: "class"
forget_classes: [0]

epochs: 100
batch_size: 32
lr: 3.0e-8
# lr: 3.0e-3
fa_threshold: 0.8 
seed: 42