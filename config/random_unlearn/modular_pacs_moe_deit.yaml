use_wandb: false   # set to true to enable wandb logging

dataset: "pacs"
data_dir: "/home/pnu_r/AMC/MoE/MoE_Unlearning/domainbed/data/PACS"

# model config
model_name: "deit_small_patch16_224"
pretrained: false
use_moe: true          # switches from DeiTArchitecture → MoEDeiTArchitecture
num_experts: 8         # M — total number of experts in ExplicitMoEHead

batch_size: 32
lr: 0.0001
epochs: 200
fa_threshold: 0.80
seed: 42

forget_ratio: 0.2
pretrained_model_path: "checkpoint/learn/pacs_moe_deit_small.pt"
unlearn_algo: "modular_unlearn"

# --- expert selection ---
# top-k: activate the k highest routing-mass experts (takes priority over tau)
modular_top_k: 2
# tau: activate experts where score > tau (uncomment to use instead of top_k)
# modular_tau: 0.05

# --- loss weights ---
modular_beta: 1.0        # weight on L_retain
modular_gamma: 1.0       # weight on L_distill (KL from frozen teacher)
modular_lambda_div: 0.0  # weight on L_div diversity penalty (0 = disabled)

# --- step-interval MIA convergence check ---
# run MIA eval every N steps; halt when MIA ∈ [0.48, 0.52]
# default (omitted): eval once per epoch (= min(forget_steps, retain_steps))
# modular_eval_interval: 50
