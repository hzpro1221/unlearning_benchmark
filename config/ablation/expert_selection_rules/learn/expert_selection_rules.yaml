dataset: "pacs"
data_dir: "./dataset/data_folder/pacs"

model_name: "module_small_patch16_224"
moe_layers: "FFFFFFFFSFSF"

num_experts: 12
expert_depth: 2
expert_hidden_ratio: 0.10
gate_k: 4

lambda_sparse: 0.1
lambda_balance: 0.25
lambda_div: 0.1

pretrained: true

unlearn_setting: "random"
forget_ratio: 0.10

# unlearn_setting: "class"
# forget_classes: [3]

# unlearn_setting: "domain"
# forget_domaines: [1]

epochs: 100
batch_size: 32
lr: 5.0e-4
seed: 42