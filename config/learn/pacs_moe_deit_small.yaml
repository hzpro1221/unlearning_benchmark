use_wandb: false   # set to true to enable wandb logging

dataset: "pacs"
data_dir: "/home/pnu_r/AMC/MoE/MoE_Unlearning/domainbed/data/PACS"

# model config
model_name: "deit_small_patch16_224"
pretrained: false
use_moe: true       # trains MoEDeiTArchitecture instead of plain DeiT
num_experts: 8      # M — must match the value used in the unlearning config

unlearn_setting: "random"
forget_ratio: 0.2

batch_size: 32
lr: 0.0001
epochs: 100
seed: 42

# checkpoint saved to: checkpoint/learn/pacs_moe_deit_small.pt
# this path is referenced by pretrained_model_path in the unlearn config
